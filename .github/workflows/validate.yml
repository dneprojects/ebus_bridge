name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    # Die HACS-Action liest Datei-Inhalte über die GitHub-API; bei PRIVATEM Repo
    # schlagen die inhalts-basierten Checks (hacsjson, integration_manifest) mit
    # "Got None" fehl. Sobald das Repo öffentlich ist, wird der Check streng grün –
    # dann continue-on-error entfernen.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands

  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff pytest
      - run: ruff check custom_components/
      - run: pytest -q
